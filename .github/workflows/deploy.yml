name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress runs finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (build_type=workflow) on first run, avoiding a
          # chicken-and-egg failure before Pages is turned on in settings.
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # Sub-path GitHub Pages serves this project from (e.g. /<repo>)
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
